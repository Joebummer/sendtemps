<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Compass needle to peak: navigation + forecasting -->
  <rect width="512" height="512" rx="96" fill="#15140f"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#e6a050" stroke-width="14" opacity="0.55"/>
  <!-- Tick marks N/E/S/W -->
  <g stroke="#e6a050" stroke-width="10" stroke-linecap="round" opacity="0.7">
    <line x1="256" y1="58" x2="256" y2="88"/>
    <line x1="256" y1="424" x2="256" y2="454"/>
    <line x1="58" y1="256" x2="88" y2="256"/>
    <line x1="424" y1="256" x2="454" y2="256"/>
  </g>
  <!-- Needle: peak pointing north -->
  <path d="M256 96 L320 360 L256 320 L192 360 Z" fill="#e6a050" stroke="#e6a050" stroke-width="6" stroke-linejoin="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="296" r="14" fill="#15140f" stroke="#e6a050" stroke-width="6"/>
</svg>
