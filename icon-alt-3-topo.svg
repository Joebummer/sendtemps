<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Stacked topographic ridge lines with summit marker -->
  <rect width="512" height="512" rx="96" fill="#15140f"/>
  <!-- 4 ridge lines, increasing opacity bottom to top -->
  <g fill="none" stroke="#e6a050" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <path d="M48 416 L160 360 L256 384 L352 344 L464 408" opacity="0.35"/>
    <path d="M48 356 L144 280 L256 320 L368 264 L464 332" opacity="0.55"/>
    <path d="M48 292 L160 200 L256 248 L352 192 L464 268" opacity="0.78"/>
    <path d="M64 224 L176 124 L256 168 L344 112 L448 200" opacity="1"/>
  </g>
  <!-- Summit marker dot -->
  <circle cx="176" cy="124" r="22" fill="#e6a050"/>
  <circle cx="176" cy="124" r="10" fill="#15140f"/>
</svg>
